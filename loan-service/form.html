<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Demande de prêt immobilier</title>
</head>
<body>
    <h1>Formulaire de demande de prêt immobilier</h1>
    <form action="/loans" method="post">
        <label for="client_id">Identifiant du client:</label>
        <input type="text" id="client_id" name="client_id" required><br><br>

        <label for="client_name">Nom du client:</label>
        <input type="text" id="client_name" name="client_name" required><br><br>

        <label for="property_address">Adresse du bien:</label>
        <input type="text" id="property_address" name="property_address" required><br><br>

        <label for="property_value">Valeur estimée du bien:</label>
        <input type="number" id="property_value" name="property_value" step="0.01" required><br><br>

        <label for="loan_amount">Montant du prêt:</label>
        <input type="number" id="loan_amount" name="loan_amount" step="0.01" required><br><br>

        <label for="loan_term_years">Durée du prêt (années):</label>
        <input type="number" id="loan_term_years" name="loan_term_years" required><br><br>

        <button type="submit">Soumettre la demande</button>
    </form>
</body>
</html>
