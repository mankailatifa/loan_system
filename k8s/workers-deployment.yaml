
apiVersion: apps/v1
kind: Deployment
metadata:
  name: credit-worker-deployment
spec:
  replicas: 2 # On lance 2 instances pour traiter les scores plus vite !
  selector:
    matchLabels:
      app: credit-worker
  template:
    metadata:
      labels:
        app: credit-worker
    spec:
      containers:
      - name: credit-worker
        image: credit-worker:latest # L'image que tu as buildée
        # On surcharge la commande du Dockerfile pour être sûr de la file
        args: ["celery", "-A", "app.tasks", "worker", "-Q", "credit_queue", "--loglevel=info"]
        env:
        - name: CELERY_BROKER_URL
          value: "amqp://guest:guest@rabbitmq-service:5672//"
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres-service:5432/loan_db"

