          value: "postgresql://user:password@postgres-service:5432/loan_db"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: property-worker-deployment
spec:
  replicas: 2 # On peut en mettre 2 pour traiter les dossiers en parallèle
  selector:
    matchLabels:
      app: property-worker
  template:
    metadata:
      labels:
        app: property-worker
    spec:
      containers:
      - name: property-worker
        image: property-worker:latest
        # On force l'écoute de la file "property_queue"
        args: ["celery", "-A", "app.tasks", "worker", "-Q", "property_queue", "--loglevel=info"]
        env:
        - name: CELERY_BROKER_URL
          value: "amqp://guest:guest@rabbitmq-service:5672//"
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres-service:5432/loan_db"