apiVersion: apps/v1
kind: Deployment
metadata:
  name: loan-service-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loan-service
  template:
    metadata:
      labels:
        app: loan-service
    spec:
      containers:
      - name: loan-service
        image: loan-service:latest
        imagePullPolicy: Never # Force Kubernetes à utiliser l'image locale que tu as buildée
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://user:password@postgres-service:5432/loan_db"
        - name: CELERY_BROKER_URL
          value: "amqp://guest:guest@rabbitmq-service:5672//"
---
apiVersion: v1
kind: Service
metadata:
  name: loan-service
spec:
  type: NodePort
  selector:
    app: loan-service
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
      nodePort: 30001 # C'est le port pour ton navigateur : http://localhost:30001